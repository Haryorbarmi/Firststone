<!-- FAQPage structured data — helps Google show rich FAQ snippets and feeds answer-style AI/GEO surfaces. -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "What types of projects do you handle?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "We work on residential, commercial, hospitality, mixed-use, and renovation projects — ranging from custom homes and apartment blocks to large-scale developments, hotels, offices, schools, and healthcare facilities across Nigeria."
      }
    },
    {
      "@type": "Question",
      "name": "How is the project cost estimated?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "We provide a detailed, line-item estimate after our discovery call and a site visit. Costs are based on scope, materials, finishes, site conditions, and programme. You receive a transparent breakdown with no hidden charges, and we keep you updated as decisions are made."
      }
    },
    {
      "@type": "Question",
      "name": "How long does a typical project take?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Timeline depends on scope. A residential renovation typically takes 8 to 16 weeks; a custom home, 6 to 12 months; a commercial or mixed-use development, 12 to 24 months. We commit to a programme in writing before construction starts and report against it weekly."
      }
    },
    {
      "@type": "Question",
      "name": "How do you ensure quality during construction?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Quality is built in, not inspected in. We use a multi-stage QA process: daily site checks, weekly photographic reports, certified material sign-off, third-party structural inspections, and a closing snag list resolved before handover. Every project also comes with our 12-month aftercare commitment."
      }
    },
    {
      "@type": "Question",
      "name": "Do you handle permits, approvals, and compliance?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. We manage the full statutory pathway — design submissions, planning permits, environmental clearances, building approvals, and post-completion certifications — across local and state authorities. We coordinate with engineers, surveyors, and regulators so you don't have to."
      }
    },
    {
      "@type": "Question",
      "name": "Can you work with my existing architect or designer?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Absolutely. We collaborate with external architects, interior designers, and consultants. We can also bring you our in-house design team if you'd prefer a single point of accountability from concept to completion."
      }
    },
    {
      "@type": "Question",
      "name": "What regions do you serve?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Our headquarters is in Ibadan, Oyo State, and we deliver projects across Lagos, Abuja, Port Harcourt, Kano, Enugu, and the broader South-West, South-East, and FCT regions. For sites outside these, get in touch and we'll let you know if we can support."
      }
    },
    {
      "@type": "Question",
      "name": "How do I get started with my project?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Fill out the form on our Contact page or send us an email at hello@firststone.ng. Our team responds within 24 hours to schedule a discovery call. From there, we'll arrange a site visit, scope out the brief, and prepare a proposal within 2 to 3 weeks."
      }
    }
  ]
}
</script>
